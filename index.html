<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RC Hair - Premium Hair Extensions</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <!-- 修正字体链接 -->
  <link href="https://googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Questrial&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F2F2F2;
      --fg: #2D2D2D;
      --elite-grey: #A8A8A8;
      --elite-charcoal: #333333;
      --elite-light: #E0E0E0;
      --white: #FFFFFF;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Questrial', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== Navigation ===== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.4s ease;
    }

    .nav.scrolled {
      background: rgba(242, 242, 242, 0.92);
      backdrop-filter: blur(20px);
      padding: 1rem 3rem;
      box-shadow: 0 2px 20px rgba(0,0,0,0.05);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.75rem;
      letter-spacing: 0.3em;
      color: var(--fg);
      text-decoration: none;
      text-transform: uppercase;
    }

    .nav-links { display: flex; gap: 3rem; list-style: none; }
    .nav-links a {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--fg);
      text-decoration: none;
      position: relative;
    }

    /* ===== Hero Section ===== */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      /* 替换为在线高清占位图 */
      background-image: url("https://unsplash.com");
      background-size: cover;
      background-position: center;
      filter: brightness(0.7);
      transform: scale(1.05);
      animation: heroZoom 20s ease-in-out infinite alternate;
    }

    @keyframes heroZoom { from { transform: scale(1.05); } to { transform: scale(1.15); } }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      color: var(--white);
      max-width: 800px;
      padding: 0 2rem;
    }

    .hero-subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      animation: fadeUp 1s ease 0.3s forwards;
      opacity: 0;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 300;
      margin-bottom: 2rem;
      animation: fadeUp 1s ease 0.6s forwards;
      opacity: 0;
    }

    .hero-cta {
      display: inline-block;
      padding: 1.2rem 3rem;
      border: 1px solid var(--white);
      color: var(--white);
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      transition: 0.3s;
      animation: fadeUp 1s ease 0.9s forwards;
      opacity: 0;
    }

    .hero-cta:hover { background: var(--white); color: var(--fg); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Product Grid ===== */
    .section { padding: 8rem 2rem; max-width: 1400px; margin: 0 auto; }
    .section-title {
      font-family: var(--font-display);
      font-size: 3rem;
      text-align: center;
      margin-bottom: 4rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }

    .product-card {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3/4;
      background: #ddd;
    }

    .product-card img {
      width: 100%; height: 100%; object-fit: cover;
      transition: 0.8s;
    }

    .product-card:hover img { transform: scale(1.1); }

    .product-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 2rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: white;
    }
  </style>
</head>
<body>

  <nav class="nav" id="mainNav">
    <a href="#" class="nav-logo">RC HAIR</a>
    <ul class="nav-links">
      <li><a href="#collections">Collections</a></li>
      <li><a href="#">Quality</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-subtitle">Premium Extensions</p>
      <h1 class="hero-title">Refined <em>Elegance</em></h1>
      <a href="#collections" class="hero-cta">View Collections</a>
    </div>
  </header>

  <section class="section" id="collections">
    <h2 class="section-title">The Collection</h2>
    <div class="products-grid">
      <!-- 产品示例 1 -->
      <div class="product-card">
        <img src="https://unsplash.com" alt="Hair">
        <div class="product-info">
          <h3>Sleek Raw Indian</h3>
          <p>Starting at $120</p>
        </div>
      </div>
      <!-- 产品示例 2 -->
      <div class="product-card">
        <img src="https://unsplash.com" alt="Hair">
        <div class="product-info">
          <h3>Wavy Brazilian</h3>
          <p>Starting at $145</p>
        </div>
      </div>
      <!-- 产品示例 3 -->
      <div class="product-card">
        <img src="https://unsplash.com" alt="Hair">
        <div class="product-info">
          <h3>Elite Curly</h3>
          <p>Starting at $160</p>
        </div>
      </div>
    </div>
  </section>

  <script>
    // 监听滚动改变导航栏样式
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('mainNav');
      if (window.scrollY > 100) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    });
  </script>

</body>
</html>
